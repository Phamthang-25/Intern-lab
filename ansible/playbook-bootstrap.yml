---
- name: Bootstrap Ubuntu OS for RKE2 Single-Node
  hosts: rke2_nodes
  become: true
  tasks:
    - name: Wait for apt locks to be released (AWS Ubuntu auto-updates)
      shell: |
        while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/lib/dpkg/lock >/dev/null 2>&1; do
          echo "Waiting for other apt process to finish..."
          sleep 5
        done
      register: apt_lock_wait
      changed_when: false

    - name: Update apt cache and upgrade packages
      apt:
        update_cache: yes
        upgrade: dist
        force_apt_get: yes
      register: apt_upgrade
      retries: 5
      delay: 10
      until: apt_upgrade is success

    - name: Install required utility packages
      apt:
        name:
          - curl
          - wget
          - git
          - unzip
          - tar
          - socat
          - conntrack
          - iptables
          - jq
          - ca-certificates
          - software-properties-common
        state: present
      register: apt_install
      retries: 5
      delay: 10
      until: apt_install is success

    - name: Set system timezone to Asia/Ho_Chi_Minh
      timezone:
        name: Asia/Ho_Chi_Minh

    - name: Disable Swap (immediately)
      command: swapoff -a
      failed_when: false
      changed_when: true

    - name: Disable Swap in /etc/fstab (permanently)
      replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+.*?)$'
        replace: '# \1'

    - name: Load kernel modules for Kubernetes/RKE2
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Persist kernel modules on boot
      copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/k8s.conf
        mode: '0644'

    - name: Set sysctl parameters for Kubernetes
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/99-kubernetes-cri.conf
        reload: yes
      loop:
        - { name: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { name: 'net.ipv4.ip_forward', value: '1' }
        - { name: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }

    - name: Check if UFW is active
      shell: systemctl is-active ufw
      register: ufw_status
      failed_when: false
      changed_when: false

    - name: Disable UFW if active (AWS Security Group handles firewall)
      systemd:
        name: ufw
        state: stopped
        enabled: no
      when: ufw_status.stdout == "active"

    - name: Notify Bootstrap Completed
      debug:
        msg: "Ubuntu OS đã được bootstrap thành công! Sẵn sàng cài đặt RKE2."
